<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台語漢羅排版分析儀 - AditorWork 專業編輯版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2a9d8f;
            --secondary: #e9c46a;
            --danger: #e76f51;
            --no-break: #8338ec;
            --bg: #f8f9fa;
        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); color: #333; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #ddd; padding-bottom: 15px; }
        
        /* 編輯區域佈局 */
        .editor-area { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
        textarea { width: 100%; height: 480px; padding: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; resize: none; box-sizing: border-box; }
        textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(42,157,143,0.1); }
        
        /* 側欄數據 */
        .sidebar { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stats-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #eee; }
        .label { font-size: 13px; color: #777; display: block; }
        .value { font-size: 20px; font-weight: bold; color: var(--primary); }
        
        /* 診斷報告區域 */
        .advice-card { background: #fff; margin-top: 25px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: none; }
        .report-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .risk-tag { padding: 6px 15px; border-radius: 30px; font-size: 14px; font-weight: bold; }
        
        /* 燈號顏色 */
        .low-risk { background: #e9f5f2; color: #2a9d8f; }
        .mid-risk { background: #fff4e6; color: #f8961e; }
        .high-risk { background: #ffebee; color: #d62828; }

        /* 風險細節區塊 */
        .section-box { margin-top: 15px; padding: 15px; border-radius: 8px; border-left: 5px solid #ddd; }
        .danger-box { background: #fff5f5; border-color: var(--danger); }
        .nobreak-box { background: #f3f0ff; border-color: var(--no-break); }
        .word-list { font-family: "Courier New", monospace; font-size: 14px; margin: 10px 0; padding-left: 20px; color: #444; }
        
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #21867a; transform: translateY(-2px); }
        
        canvas { max-width: 100%; margin: 10px 0; }
        h4 { margin-bottom: 5px; margin-top: 0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>台語漢羅排版分析儀</h1>
        <p>「A編子的編輯台」專屬排版壓力測試工具</p>
    </header>

    <div class="editor-area">
        <div class="main-input">
            <textarea id="textInput" placeholder="在此貼入台語文稿，系統將針對漢羅比例、輕聲禁斷與長詞破洞進行專業評估..."></textarea>
            <button onclick="performAnalysis()">執行診斷與排版建議</button>
        </div>

        <div class="sidebar">
            <div class="stats-item" style="border:none;">
                <span class="label">佔比視覺化</span>
                <canvas id="ratioChart"></canvas>
            </div>
            <div id="statList"></div>
        </div>
    </div>

    <div id="adviceSection" class="advice-card">
        <div class="report-header">
            <h2 style="margin:0;">📋 排版壓力診斷報告</h2>
            <div id="riskLevel" class="risk-tag"></div>
        </div>
        
        <div id="adviceContent">
            </div>
    </div>
</div>

<script>
    let myChart = null;

    function performAnalysis() {
        const text = document.getElementById('textInput').value;
        if (!text.trim()) return;

        // 1. 核心邏輯辨識
        const hanzi = text.match(/[\u4e00-\u9fa5]/g) || [];
        const loresMatches = text.match(/[A-Za-z\u00C0-\u024F\u1E00-\u1EFF]+(-[A-Za-z\u00C0-\u024F\u1E00-\u1EFF]+)*/g) || [];
        const loresLength = loresMatches.join('').length;
        const total = (hanzi.length + loresLength) || 1;
        const hanRatio = (hanzi.length / total * 100);
        const loRatio = 100 - hanRatio;

        // 2. 特殊語法風險檢測
        const noBreaks = [...new Set(text.match(/[A-Za-z\u00C0-\u024F\u1E00-\u1EFF]+--[A-Za-z\u00C0-\u024F\u1E00-\u1EFF]+/g) || [])];
        const longWords = [...new Set(loresMatches.filter(word => word.length > 12))];

        // 3. 更新側欄
        document.getElementById('statList').innerHTML = `
            <div class="stats-item"><span class="label">漢字總數</span><span class="value">${hanzi.length}</span></div>
            <div class="stats-item"><span class="label">羅馬字元數</span><span class="value">${loresLength}</span></div>
            <div class="stats-item"><span class="label">漢羅比例</span><strong>${hanRatio.toFixed(1)}% : ${loRatio.toFixed(1)}%</strong></div>
        `;

        updateChart(hanRatio, loRatio);
        generateReport(hanRatio, noBreaks, longWords);
    }

    function updateChart(han, lo) {
        const ctx = document.getElementById('ratioChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['漢字', '羅馬字'],
                datasets: [{ data: [han, lo], backgroundColor: ['#2a9d8f', '#e9c46a'], borderWidth: 0 }]
            },
            options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
        });
    }

    function generateReport(hanRatio, noBreaks, longWords) {
        const section = document.getElementById('adviceSection');
        const riskTag = document.getElementById('riskLevel');
        const content = document.getElementById('adviceContent');
        section.style.display = 'block';

        let reportHtml = "";

        // --- 排版風險評估 (燈號邏輯) ---
        if (hanRatio > 85) {
            riskTag.innerText = "排版風險：低 (漢字主導)";
            riskTag.className = "risk-tag low-risk";
            reportHtml += `<h4>【問題診斷】</h4><p>版面結構穩定。羅馬字僅為零星點綴，不影響整體閱讀律動。</p>
                           <h4>【排版建議】</h4><ul><li>使用 InDesign 預設「繁體中文」間距組合即可。</li><li>注意單個羅馬字詞是否在行末被強制斷開。</li></ul>`;
        } else if (hanRatio > 40) {
            riskTag.innerText = "排版風險：高 (漢羅失衡區)";
            riskTag.className = "risk-tag high-risk";
            reportHtml += `<h4>【問題診斷】</h4><p>這是最易產生「字距破洞」的比例。中西文字符密度差異巨大，左右齊行時會強行拉開漢字間距。</p>
                           <h4>【排版建議】</h4><ul><li><strong>核心策略：</strong>強制將「中英文間距」設為 0%。</li><li>對羅馬字套用字元樣式：縮小 3-5%、緊縮 Tracking (-15~-20)。</li></ul>`;
        } else {
            riskTag.innerText = "排版風險：中 (羅馬字主導)";
            riskTag.className = "risk-tag mid-risk";
            reportHtml += `<h4>【問題診斷】</h4><p>版面趨向西文排版，漢字反而成為點綴。主要風險在於聲調符號造成行間擁擠。</p>
                           <h4>【排版建議】</h4><ul><li>行距 (Leading) 建議加寬至字級的 200%。</li><li>開啟西文排版模式，並優先對齊西文基線。</li></ul>`;
        }

        // --- 語法風險：輕聲禁斷 ---
        if (noBreaks.length > 0) {
            reportHtml += `
                <div class="section-box nobreak-box">
                    <h4 style="color:var(--no-break)">🛑 語法禁忌：輕聲詞不可斷行</h4>
                    <p><small>偵測到 ${noBreaks.length} 組「--」詞彙。輕聲雙連字號在語法上具有完整性，嚴禁拆散至兩行。</small></p>
                    <ul class="word-list">${noBreaks.map(w => `<li>${w}</li>`).join('')}</ul>
                    <p><small><strong>建議：</strong>在 InDesign 中選取這些詞並勾選「不換行 (No Break)」。</small></p>
                </div>
            `;
        }

        // --- 排版風險：超長詞破洞 ---
        if (longWords.length > 0) {
            reportHtml += `
                <div class="section-box danger-box">
                    <h4 style="color:var(--danger)">⚠️ 視覺風險：超長詞彙破洞</h4>
                    <p><small>偵測到 ${longWords.length} 個超長詞彙。若位於行末，軟體會因無法斷詞而導致前一行字距暴衝。</small></p>
                    <ul class="word-list">${longWords.map(w => `<li>${w}</li>`).join('')}</ul>
                    <p><small><strong>建議：</strong>僅允許在既存的「-」處換行，嚴禁切斷單個音節。必要時請手動插入軟性連字號。</small></p>
                </div>
            `;
        }

        content.innerHTML = reportHtml;
        section.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
